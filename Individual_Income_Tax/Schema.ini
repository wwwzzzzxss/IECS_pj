顯示計量單位=千元
顯示轉換係數=1
圖表顯示格式=999,999,999,999,999
備註=中位數：中位數是依數值大小順序排列的觀察值中居於中央的那一個數值。若將母體觀察值由小而大排列，N為觀察值的個數：(1)、若 N為奇數，則中位數為數列中第 (N+1)/2 個的那一個數值。(2)、若 N為偶數，則取 (N+1)/2 前後兩個數之平均數為中位數。
