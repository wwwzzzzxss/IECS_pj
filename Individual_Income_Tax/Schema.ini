備註=標準差：每一觀察值與平均數之間的差距，稱為平均數的離差。將離差的正負號去除，亦即取絕對值，再求平均數，所得結果即為「平均絕對離差」。將所有離差平方，再求其平均數，可得到「平方離差值」或稱為「變異數」。將變異數開根號所得的結果稱為「標準差」。
